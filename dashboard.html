<script>
const RSSBASE = "https://api.rss2json.com/v1/api.json";
const FEEDS = {
  uk: "https://feeds.bbci.co.uk/news/rss.xml",
  tr: "https://www.dailysabah.com/rssFeed/front-page",
  me: "https://www.aljazeera.com/xml/rss/all.xml",
  gala: "https://www.fanatik.com.tr/rss",
  epl: "https://feeds.bbci.co.uk/sport/football/premier-league/rss.xml"
};

const FEED_LABELS = {
  uk: "UK",
  tr: "Turkey",
  me: "Middle East",
  gala: "Galatasaray",
  epl: "Premier League"
};

const fetched = {};
let activeFeed = "uk";
let activeMkt = "core";

function relTime(dateStr){
  if(!dateStr) return "Time n/a";
  const d = new Date(dateStr);
  const mins = Math.max(1, Math.round((Date.now() - d.getTime()) / 60000));
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.round(hrs / 24);
  return `${days}d ago`;
}

function shortSource(link){
  try{
    const h = new URL(link).hostname.replace("www.","");
    return h.split(".")[0].toUpperCase();
  }catch{
    return "SOURCE";
  }
}

function cleanSummary(txt){
  const d = document.createElement("div");
  d.innerHTML = txt || "";
  return d.textContent.trim().replace(/\s+/g," ").slice(0,160);
}

function tagSet(cat, title){
  const t = title.toLowerCase();
  const tags = [FEED_LABELS[cat]];
  if (t.includes("market") || t.includes("inflation") || t.includes("rates")) tags.push("Macro");
  if (t.includes("oil") || t.includes("gas")) tags.push("Energy");
  if (t.includes("bank") || t.includes("sterling") || t.includes("lira")) tags.push("FX");
  if (t.includes("transfer") || t.includes("goal") || t.includes("manager")) tags.push("Club");
  if (t.includes("premier league") || t.includes("arsenal") || t.includes("liverpool")) tags.push("Football");
  return tags.slice(0,3);
}

async function loadFeed(cat){
  if (fetched[cat]) return;
  const el = document.getElementById(`feed-${cat}`);
  el.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading briefing</div>`;
  try{
    const url = `${RSSBASE}?rss_url=${encodeURIComponent(FEEDS[cat])}&count=8`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.status !== "ok" || !d.items?.length) throw new Error("empty");

    const items = d.items.slice(0,8);
    const lead = items[0];
    const leadText = cleanSummary(lead.description) || lead.title;

    const html = `
      <div class="news-brief">
        <div class="news-brief-title">${FEED_LABELS[cat]} Brief</div>
        <div class="news-brief-text">${leadText}</div>
      </div>
      ${items.map(item => {
        const summary = cleanSummary(item.description);
        const tags = tagSet(cat, item.title).map(t => `<span class="news-tag">${t}</span>`).join("");
        return `
          <div class="news-card">
            <a class="news-headline" href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
            ${summary ? `<div class="news-summary">${summary}</div>` : ""}
            <div class="news-tags">${tags}</div>
            <div class="news-meta-row">
              <span>${shortSource(item.link)}</span>
              <span>${relTime(item.pubDate)}</span>
            </div>
          </div>
        `;
      }).join("")}
    `;
    el.innerHTML = html;
    fetched[cat] = true;
  }catch{
    el.innerHTML = `<div class="err-state">Briefing unavailable. <a href="#" onclick="delete fetched['${cat}']; loadFeed('${cat}'); return false;" style="color:var(--teal)">Retry</a></div>`;
  }
}

function switchFeed(cat, btn){
  document.querySelectorAll("#news-tabs .tab-btn").forEach(b => b.className = "tab-btn");
  document.querySelectorAll(".feed").forEach(f => f.classList.remove("active"));
  btn.className = "tab-btn active-teal";
  document.getElementById(`feed-${cat}`).classList.add("active");
  activeFeed = cat;
  loadFeed(cat);
}

function reloadCurrentFeed(){
  delete fetched[activeFeed];
  loadFeed(activeFeed);
}

function num(v, dp=2){
  if (v === null || v === undefined || Number.isNaN(v)) return "--";
  return Number(v).toLocaleString("en-GB", {maximumFractionDigits:dp, minimumFractionDigits:dp});
}

function signed(v, dp=2){
  if (v === null || v === undefined || Number.isNaN(v)) return "--";
  const n = Number(v);
  return `${n >= 0 ? "+" : ""}${n.toFixed(dp)}%`;
}

function cls(v){
  if (v > 0) return "up";
  if (v < 0) return "down";
  return "neu";
}

function marketTile(name, sub, price, chg, signal){
  return `
    <div class="market-tile">
      <div class="market-tile-top">
        <div>
          <div class="market-tile-name">${name}</div>
          <div class="market-tile-sub">${sub}</div>
        </div>
        <div class="market-tile-price">${price}</div>
      </div>
      <div class="market-tile-chg ${cls(chg)}">${signed(chg)}</div>
      <div class="market-signal">${signal}</div>
    </div>
  `;
}

function row(name, sub, price, chg, dir){
  return `
    <div class="mkt-item">
      <div class="mkt-left">
        <div class="mkt-name">${name}</div>
        ${sub ? `<div class="mkt-sub">${sub}</div>` : ""}
      </div>
      <div class="mkt-right">
        <div class="mkt-price">${price}</div>
        ${chg !== null && chg !== undefined ? `<div class="mkt-chg ${dir || cls(chg)}">${typeof chg === "number" ? signed(chg) : chg}</div>` : ""}
      </div>
    </div>
  `;
}

function setBrief(id, value, note){
  document.getElementById(id).textContent = value;
  document.getElementById(`${id}-note`).textContent = note;
}

function switchMkt(cat, btn){
  document.querySelectorAll("#mkt-tabs .tab-btn").forEach(b => b.className = "tab-btn");
  document.querySelectorAll(".mkt-section").forEach(s => s.classList.remove("active"));
  btn.className = "tab-btn active-gold";
  document.getElementById(`mkt-${cat}`).classList.add("active");
  activeMkt = cat;
}

async function fetchJson(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error("fetch fail");
  return r.json();
}

async function getYahooChart(sym){
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(yUrl)}`;
  const outer = await fetchJson(proxy);
  const data = JSON.parse(outer.contents);
  const res = data.chart.result[0];
  const closes = res.indicators.quote[0].close.filter(Boolean);
  const last = closes[closes.length - 1];
  const prev = closes[closes.length - 2];
  const pct = ((last - prev) / prev) * 100;
  return {last, pct};
}

async function loadCoreMarkets(){
  const el = document.getElementById("mkt-core");
  el.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading core tape</div>`;
  try{
    const [gbp, usd, ftse, bist, spx, dj, kfy, brent] = await Promise.all([
      fetchJson("https://open.er-api.com/v6/latest/GBP"),
      fetchJson("https://open.er-api.com/v6/latest/USD"),
      getYahooChart("^FTSE"),
      getYahooChart("XU100.IS"),
      getYahooChart("^GSPC"),
      getYahooChart("^DJI"),
      getYahooChart("KFY"),
      getYahooChart("BZ=F")
    ]);

    const gbpusd = gbp.rates.USD;
    const usdtry = usd.rates.TRY;

    el.innerHTML = `
      <div class="section-mini">Core Tape</div>
      <div class="market-grid">
        ${marketTile("FTSE 100","London",num(ftse.last,0),ftse.pct,ftse.pct >= 0 ? "UK risk tone firmer on the day." : "UK equities softer into the close.")}
        ${marketTile("S&P 500","New York",num(spx.last,0),spx.pct,spx.pct >= 0 ? "US risk appetite holding up." : "US index tone leaning defensive.")}
        ${marketTile("GBP/USD","Sterling",num(gbpusd,4),0,gbpusd > 1.25 ? "Sterling trading on the stronger side." : "Sterling holding a softer range.")}
        ${marketTile("USD/TRY","Lira",num(usdtry,2),0,usdtry > 30 ? "Lira remains under pressure versus USD." : "Lira relatively stable on this snapshot.")}
        ${marketTile("KFY","Korn Ferry",num(kfy.last,2),kfy.pct,kfy.pct >= 0 ? "Stock showing positive daily momentum." : "Stock under mild pressure today.")}
        ${marketTile("Brent","ICE",num(brent.last,2),brent.pct,brent.pct >= 0 ? "Crude bid, supportive for energy complex." : "Oil easing, reducing energy pressure.")}
      </div>
    `;

    setBrief("brief-ftse", `${num(ftse.last,0)}  ${signed(ftse.pct)}`, ftse.pct >= 0 ? "London equities positive." : "London equities softer.");
    setBrief("brief-gbpusd", num(gbpusd,4), gbpusd > 1.25 ? "Sterling firm versus dollar." : "Sterling in a softer band.");
    setBrief("brief-brent", `${num(brent.last,2)}  ${signed(brent.pct)}`, brent.pct >= 0 ? "Oil bid on the session." : "Oil easing versus prior close.");
    setBrief("brief-kfy", `${num(kfy.last,2)}  ${signed(kfy.pct)}`, kfy.pct >= 0 ? "KFY in positive territory." : "KFY off prior close.");
  }catch{
    el.innerHTML = `<div class="err-state">Core market tape unavailable.</div>`;
    setBrief("brief-ftse","--","Core tape unavailable");
    setBrief("brief-gbpusd","--","FX unavailable");
    setBrief("brief-brent","--","Energy unavailable");
    setBrief("brief-kfy","--","Equity unavailable");
  }
}

async function loadFX(){
  const el = document.getElementById("mkt-fx");
  try{
    const [rG, rU] = await Promise.all([
      fetchJson("https://open.er-api.com/v6/latest/GBP"),
      fetchJson("https://open.er-api.com/v6/latest/USD")
    ]);
    const g = rG.rates, u = rU.rates;
    el.innerHTML = `
      <div class="section-mini">Sterling Pairs</div>
      ${row("GBP/USD","Cable",num(g.USD,4),null,"neu")}
      ${row("GBP/EUR","Sterling-Euro",num(g.EUR,4),null,"neu")}
      ${row("GBP/TRY","Sterling-Lira",num(g.TRY,2),null,"neu")}
      ${row("GBP/AED","Sterling-Dirham",num(g.AED,4),null,"neu")}
      ${row("GBP/AZN","Sterling-Manat",num(g.AZN,4),null,"neu")}
      ${row("GBP/KWD","Sterling-Dinar",num(g.KWD,4),null,"neu")}
      <div class="section-mini">Dollar Pairs</div>
      ${row("USD/TRY","Dollar-Lira",num(u.TRY,2),null,"neu")}
      ${row("EUR/TRY","Euro-Lira",num(u.TRY / u.EUR,2),null,"neu")}
    `;
  }catch{
    el.innerHTML = `<div class="err-state">FX unavailable</div>`;
  }
}

async function loadCrypto(){
  const el = document.getElementById("mkt-crypto");
  try{
    const d = await fetchJson("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true");
    el.innerHTML = `
      ${row("BTC","Bitcoin",num(d.bitcoin.usd,0),d.bitcoin.usd_24h_change)}
      ${row("ETH","Ethereum",num(d.ethereum.usd,0),d.ethereum.usd_24h_change)}
      ${row("SOL","Solana",num(d.solana.usd,2),d.solana.usd_24h_change)}
    `;
  }catch{
    el.innerHTML = `<div class="err-state">Crypto unavailable</div>`;
  }
}

async function loadMetals(){
  const el = document.getElementById("mkt-metals");
  try{
    const d = await fetchJson("https://open.er-api.com/v6/latest/USD");
    const xau = d.rates.XAU ? 1 / d.rates.XAU : null;
    const xag = d.rates.XAG ? 1 / d.rates.XAG : null;
    let html = "";
    html += row("Gold","XAU/USD",xau ? num(xau,2) : "--",null,"neu");
    html += row("Silver","XAG/USD",xag ? num(xag,2) : "--",null,"neu");
    html += row("Brent Crude","ICE", "See Core", null, "neu");
    el.innerHTML = html;
  }catch{
    el.innerHTML = `<div class="err-state">Metals unavailable</div>`;
  }
}

async function loadAllMarkets(){
  await Promise.all([loadCoreMarkets(), loadFX(), loadCrypto(), loadMetals()]);
  const ts = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("mkt-ts").textContent = `Updated ${ts}`;
}

loadFeed("uk");
loadAllMarkets();
setInterval(loadAllMarkets, 5 * 60 * 1000);
</script>
