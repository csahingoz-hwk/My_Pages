    DATA = [];
    
    // Find column indices
    const colMap = {};
    headers.forEach((h, i) => {
        const clean = h.trim().replace(/"/g, '').toLowerCase();
        if (clean.includes('ecc gl') && !clean.includes('desc')) colMap.eccGL = i;
        if (clean.includes('ecc') && clean.includes('desc')) colMap.eccDesc = i;
        if (clean.includes('s4 gl') && !clean.includes('desc')) colMap.s4GL = i;
        if (clean.includes('s4') && clean.includes('desc')) colMap.s4Desc = i;
        if (clean.includes('gr fs') || clean.includes('fs item')) colMap.fs = i;
        if (clean.includes('fs') && clean.includes('desc')) colMap.fsDesc = i;
        if (clean === 'gr2' || clean.includes('gr2')) colMap.gr2 = i;
        if (clean.includes('gr level 2') || clean.includes('gr2') && clean.includes('desc')) colMap.gr2Desc = i;
        if (clean === 'gr3' || clean.includes('gr3')) colMap.gr3 = i;
        if (clean.includes('gr level 3') || clean.includes('gr3') && clean.includes('desc')) colMap.gr3Desc = i;
        if (clean === 'gr4' || clean.includes('gr4')) colMap.gr4 = i;
        if (clean.includes('gr level 4') || clean.includes('gr4') && clean.includes('desc')) colMap.gr4Desc = i;
    });
    
    // Default mapping if auto-detect fails (BOBJ standard format)
    if (!colMap.eccGL) {
        colMap.eccGL = 0; colMap.eccDesc = 1; colMap.s4GL = 3; colMap.s4Desc = 4;
        colMap.fs = 6; colMap.fsDesc = 7; colMap.gr2 = 9; colMap.gr2Desc = 10;
        colMap.gr3 = 12; colMap.gr3Desc = 13; colMap.gr4 = 15; colMap.gr4Desc = 16;
    }
    
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
        if (cols[colMap.eccGL]) {
            DATA.push([
                cols[colMap.eccGL] || '',
                cols[colMap.eccDesc] || '',
                cols[colMap.s4GL] || '',
                cols[colMap.s4Desc] || '',
                cols[colMap.fs] || '',
                cols[colMap.fsDesc] || '',
                cols[colMap.gr2] || '',
                cols[colMap.gr2Desc] || '',
                cols[colMap.gr3] || '',
                cols[colMap.gr3Desc] || '',
                cols[colMap.gr4] || '',
                cols[colMap.gr4Desc] || ''
            ]);
        }
    }
    filtered = DATA;
}

function updateStats() {
    const gr2 = new Set(filtered.map(r => r[6])).size;
    const gr3 = new Set(filtered.map(r => r[8])).size;
    const gr4 = new Set(filtered.map(r => r[10])).size;
    const fs = new Set(filtered.map(r => r[4])).size;
    document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-val">${filtered.length.toLocaleString()}</div><div class="stat-lbl">Matching Accounts</div></div>
        <div class="stat"><div class="stat-val">${gr2}</div><div class="stat-lbl">GR2 Groups</div></div>
        <div class="stat"><div class="stat-val">${gr3}</div><div class="stat-lbl">GR3 Groups</div></div>
        <div class="stat"><div class="stat-val">${gr4}</div><div class="stat-lbl">GR4 Groups</div></div>
        <div class="stat"><div class="stat-val">${fs}</div><div class="stat-lbl">FS Items</div></div>
    `;
}

function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    document.getElementById('thead').innerHTML = '<tr><th>ECC GL</th><th>ECC Description</th><th>S4 GL</th><th>S4 Description</th><th>FS Item</th><th>FS Description</th><th>GR2</th><th>GR2 Description</th><th>GR3</th><th>GR3 Description</th><th>GR4</th><th>GR4 Description</th></tr>';
    
    if (filtered.length === 0) {
        document.getElementById('tbody').innerHTML = '<tr><td colspan="12" class="no-results">No matching accounts found.</td></tr>';
        return;
    }
    
    const display = filtered.slice(0, 500);
    document.getElementById('tbody').innerHTML = display.map(r => {
        return '<tr>' + r.map((cell, i) => {
            let val = cell != null ? String(cell) : '';
            if (search && val.toLowerCase().includes(search)) {
                const regex = new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                val = val.replace(regex, '<span class="highlight">$1</span>');
            }
            const badges = {0:'b-ecc',2:'b-s4',4:'b-fs',6:'b-gr',8:'b-gr',10:'b-gr'};
            const labels = ['ECC','','S4','','FS','','GR2','','GR3','','GR4',''];
            if (badges[i] && cell) val = `<span class="badge ${badges[i]}">${labels[i]}</span>${val}`;
            return `<td>${val}</td>`;
        }).join('') + '</tr>';
    }).join('');
}

function renderTree() {
    const container = document.getElementById('treeContainer');
    const hierarchy = {};
    
    filtered.forEach(r => {
        const gr2 = r[6] + ' - ' + r[7];
        const gr3 = r[8] + ' - ' + r[9];
        const gr4 = r[10] + ' - ' + r[11];
        const ecc = r[0] + ' | ' + r[1];
        
        if (!hierarchy[gr2]) hierarchy[gr2] = {};
        if (!hierarchy[gr2][gr3]) hierarchy[gr2][gr3] = {};
        if (!hierarchy[gr2][gr3][gr4]) hierarchy[gr2][gr3][gr4] = [];
        hierarchy[gr2][gr3][gr4].push(ecc);
    });
    
    let html = '';
    Object.keys(hierarchy).sort().forEach(gr2 => {
        const eccCount = Object.values(hierarchy[gr2]).reduce((a, gr3) => a + Object.values(gr3).reduce((b, gr4) => b + gr4.length, 0), 0);
        html += `<div class="tree-gr2" onclick="toggleTree(this)"><span class="tree-toggle">▼</span>${gr2}<span class="count">${eccCount} accounts</span></div><div class="collapsible">`;
        
        Object.keys(hierarchy[gr2]).sort().forEach(gr3 => {
            const gr4Count = Object.keys(hierarchy[gr2][gr3]).length;
            html += `<div class="tree-gr3" onclick="toggleTree(this);event.stopPropagation()"><span class="tree-toggle">▼</span>${gr3}<span class="count">${gr4Count} groups</span></div><div class="collapsible">`;
            
            Object.keys(hierarchy[gr2][gr3]).sort().forEach(gr4 => {
                const eccs = hierarchy[gr2][gr3][gr4];
                html += `<div class="tree-gr4" onclick="toggleTree(this);event.stopPropagation()"><span class="tree-toggle">▼</span>${gr4}<span class="count">${eccs.length}</span></div><div class="collapsible">`;
                eccs.sort().forEach(ecc => {
                    html += `<div class="tree-ecc">${ecc}</div>`;
                });
                html += '</div>';
            });
            html += '</div>';
        });
        html += '</div>';
    });
    
    container.innerHTML = html || '<div class="no-results">No matching accounts found.</div>';
}

function toggleTree(el) {
    const content = el.nextElementSibling;
    if (content && content.classList.contains('collapsible')) {
        content.classList.toggle('collapsed');
        const toggle = el.querySelector('.tree-toggle');
        if (toggle) toggle.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
    }
}

function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    filtered = DATA.filter(r => {
        const matchSearch = !search || r.some(cell => String(cell ?? '').toLowerCase().includes(search));
                const matchFilter = currentFilter === 'all' || String(r[6]) === currentFilter;
        return matchSearch && matchFilter;
    });
    updateStats();
    if (currentView === 'table') renderTable();
    else renderTree();
}

// Event listeners
document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilters();
    });
});

document.getElementById('tableView').addEventListener('click', () => {
    currentView = 'table';
    document.getElementById('tableView').classList.add('active');
    document.getElementById('treeView').classList.remove('active');
    document.getElementById('tableContainer').classList.remove('hidden');
    document.getElementById('treeContainer').classList.add('hidden');
    renderTable();
});

document.getElementById('treeView').addEventListener('click', () => {
    currentView = 'tree';
    document.getElementById('treeView').classList.add('active');
    document.getElementById('tableView').classList.remove('active');
    document.getElementById('treeContainer').classList.remove('hidden');
    document.getElementById('tableContainer').classList.add('hidden');
    renderTree();
});

// Initialize
updateStats();
renderTable();
</script>
</body>
</html>
